<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <title>Admin Dashboard - Wells Fargo</title>
    <style>
        :root {
            --wf-red: #d71e28;
            --wf-yellow: #ffde00;
            --sidebar-width: 260px;
        }
        body {
            background-color: #f4f7f6;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--wf-red);
            color: white;
            position: fixed;
            left: 0;
            top: 0;
            z-index: 1000;
            box-shadow: 4px 0 10px rgba(0,0,0,0.1);
        }
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .sidebar-nav {
            padding: 20px 0;
        }
        .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 12px 25px;
            display: flex;
            align-items: center;
            transition: all 0.3s;
            text-decoration: none;
        }
        .nav-link:hover, .nav-link.active {
            color: white;
            background: rgba(255,255,255,0.1);
            border-left: 4px solid var(--wf-yellow);
        }
        .nav-link i {
            margin-right: 15px;
            width: 20px;
        }
        .main-content {
            margin-left: var(--sidebar-width);
            padding: 40px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }
        .card-header {
            background: white;
            border-bottom: 1px solid #eee;
            padding: 20px 25px;
            border-radius: 12px 12px 0 0 !important;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-body {
            padding: 25px;
        }
        .btn-wf {
            background: var(--wf-red);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 6px;
            font-weight: 600;
        }
        .btn-wf:hover {
            background: #b51821;
            color: white;
        }
        .table {
            margin-bottom: 0;
        }
        .table thead th {
            border-top: none;
            background: #f8f9fa;
            text-transform: uppercase;
            font-size: 12px;
            font-weight: 700;
            color: #666;
            padding: 15px;
        }
        .table tbody td {
            padding: 15px;
            vertical-align: middle;
        }
        .account-item {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .account-info {
            flex-grow: 1;
        }
        .account-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        .balance-input {
            width: 120px;
            text-align: right;
        }
        .badge-user {
            background: #e3f2fd;
            color: #0d47a1;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .badge-admin {
            background: #fdeaea;
            color: #d71e28;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
        }
        .modal-content {
            border-radius: 15px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <img src="assets/img/wf_logo_220x23.png" alt="Wells Fargo" style="filter: brightness(0) invert(1); width: 150px;">
            <div class="mt-2 small opacity-75">Admin Control Panel</div>
        </div>
        <div class="sidebar-nav">
            <a href="#" class="nav-link active">
                <i class="fas fa-users"></i> User Management
            </a>
            <a href="#" class="nav-link" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="header">
            <h2 class="fw-bold">User Management</h2>
            <button class="btn btn-wf" data-bs-toggle="modal" data-bs-target="#addUserModal">
                <i class="fas fa-plus me-2"></i> Add New User
            </button>
        </div>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                            <tr>
                                <th>ID</th>
                                <th>Username</th>
                                <th>Full Name</th>
                                <th>Accounts & Balances</th>
                                <th class="text-end">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="userTableBody">
                            <!-- Users loaded dynamically -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div class="modal fade" id="addUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Add New User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addUserForm">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Password</label>
                            <input type="password" class="form-control" name="password" required>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" name="firstName">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" name="lastName">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email">
                        </div>
                        <button type="submit" class="btn btn-wf w-100 py-2">Create User</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Account Modal -->
    <div class="modal fade" id="addAccountModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Add New Account</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="addAccountForm">
                        <input type="hidden" name="userId" id="targetUserId">
                        <div class="mb-3">
                            <label class="form-label">Account Type</label>
                            <select class="form-select" name="accountType" required>
                                <option value="Everyday Checking">Everyday Checking</option>
                                <option value="Way2Save Savings">Way2Save Savings</option>
                                <option value="Active Cash Card">Active Cash Card</option>
                                <option value="Portfolio Checking">Portfolio Checking</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Account Number</label>
                            <input type="text" class="form-control" name="accountNumber" placeholder="e.g. 12345678" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Initial Balance ($)</label>
                            <input type="text" class="form-control" name="balance" placeholder="0.00" required>
                        </div>
                        <button type="submit" class="btn btn-wf w-100 py-2">Create Account</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit User Modal -->
    <div class="modal fade" id="editUserModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Edit User</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editUserForm">
                        <input type="hidden" name="userId" id="editUserId">
                        <div class="mb-3">
                            <label class="form-label">Username</label>
                            <input type="text" class="form-control" name="username" id="editUsername" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New Password (leave blank to keep current)</label>
                            <input type="password" class="form-control" name="password" id="editPassword">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" name="firstName" id="editFirstName">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" name="lastName" id="editLastName">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" name="email" id="editEmail">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Date of Birth</label>
                                <input type="text" class="form-control" name="dateOfBirth" id="editDateOfBirth" placeholder="MM/DD/YYYY">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">SSN</label>
                                <input type="text" class="form-control" name="socialSecurityNumber" id="editSSN">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Address</label>
                            <input type="text" class="form-control" name="address" id="editAddress">
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Home Address</label>
                                <input type="text" class="form-control" name="homeAddress" id="editHomeAddress">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Mailing Address</label>
                                <input type="text" class="form-control" name="mailingAddress" id="editMailingAddress">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Primary Phone</label>
                                <input type="text" class="form-control" name="primaryPhone" id="editPrimaryPhone">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Secondary Phone</label>
                                <input type="text" class="form-control" name="secondaryPhone" id="editSecondaryPhone">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Alternate Email</label>
                                <input type="email" class="form-control" name="alternateEmail" id="editAlternateEmail">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Occupation</label>
                                <input type="text" class="form-control" name="occupation" id="editOccupation">
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label class="form-label">Available Balance</label>
                                <input type="text" class="form-control" name="availableBalance" id="editAvailableBalance">
                            </div>
                            <div class="col-6 mb-3">
                                <label class="form-label">Everyday Checking</label>
                                <input type="text" class="form-control" name="everydayChecking" id="editEverydayChecking">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Recent Transactions (JSON format)</label>
                            <textarea class="form-control" name="transactions" id="editTransactions" rows="3"></textarea>
                        </div>
                        <button type="submit" class="btn btn-wf w-100 py-2">Update User</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        async function loadUsers() {
            try {
                const res = await fetch('/api/admin/users');
                if (!res.ok) {
                    if (res.status === 403 || res.status === 401) window.location.href = '/admin-login.html';
                    return;
                }
                const { users } = await res.json();
                const tbody = document.getElementById('userTableBody');
                tbody.innerHTML = '';

                for (const user of users) {
                    const accountsRes = await fetch(`/api/admin/users/${user.id}/accounts`);
                    const { accounts } = await accountsRes.json();
                    
                    const accountsHtml = accounts.map(acc => `
                        <div class="account-item">
                            <div class="account-info">
                                <div class="fw-bold">${acc.accountType}</div>
                                <div class="text-muted small">#${acc.accountNumber}</div>
                            </div>
                            <div class="account-actions">
                                <div class="input-group input-group-sm">
                                    <span class="input-group-text">$</span>
                                    <input type="text" class="form-control balance-input" id="balance-${acc.id}" value="${acc.balance}">
                                    <button class="btn btn-wf" onclick="updateBalance(${acc.id})"><i class="fas fa-save"></i></button>
                                </div>
                                <button class="btn btn-outline-danger btn-sm" onclick="deleteAccount(${acc.id})"><i class="fas fa-trash"></i></button>
                            </div>
                        </div>
                    `).join('');

                    const row = document.createElement('tr');
                    row.innerHTML = `
                        <td>${user.id}</td>
                        <td>
                            <div class="fw-bold">${user.username}</div>
                            <span class="${user.isAdmin ? 'badge-admin' : 'badge-user'}">${user.isAdmin ? 'Admin' : 'User'}</span>
                        </td>
                        <td>
                            <div>${user.firstName} ${user.lastName}</div>
                            <div class="text-muted small">${user.email}</div>
                            ${user.socialSecurityNumber ? `<div class="text-muted small">SSN: ${user.socialSecurityNumber}</div>` : ''}
                        </td>
                        <td>
                            <div class="mb-2">${accountsHtml}</div>
                            <button class="btn btn-sm btn-link text-decoration-none p-0" onclick="prepareAddAccount(${user.id})">
                                <i class="fas fa-plus-circle me-1"></i> Add Account
                            </button>
                        </td>
                        <td class="text-end">
                            <button class="btn btn-outline-primary btn-sm me-2" onclick="editUser(${JSON.stringify(user).replace(/"/g, '&quot;')})">
                                <i class="fas fa-edit"></i>
                            </button>
                            <button class="btn btn-outline-danger btn-sm" onclick="deleteUser(${user.id})" ${user.isAdmin ? 'disabled' : ''}>
                                <i class="fas fa-user-minus"></i>
                            </button>
                        </td>
                    `;
                    tbody.appendChild(row);
                }
            } catch (err) {
                console.error('Failed to load users', err);
            }
        }

        function prepareAddAccount(userId) {
            document.getElementById('targetUserId').value = userId;
            new bootstrap.Modal(document.getElementById('addAccountModal')).show();
        }

        function editUser(user) {
            document.getElementById('editUserId').value = user.id;
            document.getElementById('editUsername').value = user.username;
            document.getElementById('editFirstName').value = user.firstName || '';
            document.getElementById('editLastName').value = user.lastName || '';
            document.getElementById('editEmail').value = user.email || '';
            document.getElementById('editDateOfBirth').value = user.dateOfBirth || '';
            document.getElementById('editSSN').value = user.socialSecurityNumber || '';
            document.getElementById('editAddress').value = user.address || '';
            document.getElementById('editHomeAddress').value = user.homeAddress || '';
            document.getElementById('editMailingAddress').value = user.mailingAddress || '';
            document.getElementById('editPrimaryPhone').value = user.primaryPhone || '';
            document.getElementById('editSecondaryPhone').value = user.secondaryPhone || '';
            document.getElementById('editAlternateEmail').value = user.alternateEmail || '';
            document.getElementById('editOccupation').value = user.occupation || '';
            document.getElementById('editAvailableBalance').value = user.availableBalance || '';
            document.getElementById('editEverydayChecking').value = user.everydayChecking || '';
            document.getElementById('editTransactions').value = user.transactions || '';
            document.getElementById('editPassword').value = '';
            new bootstrap.Modal(document.getElementById('editUserModal')).show();
        }

        document.getElementById('editUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const userId = formData.get('userId');
            const data = Object.fromEntries(formData.entries());
            delete data.userId;
            if (!data.password) delete data.password;
            
            const res = await fetch(`/api/admin/users/${userId}`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('editUserModal')).hide();
                loadUsers();
            } else {
                const err = await res.json();
                alert(err.message);
            }
        });

        document.getElementById('addUserForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            const res = await fetch('/api/admin/users', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                const result = await res.json();
                alert('User created successfully: ' + result.user.username);
                bootstrap.Modal.getInstance(document.getElementById('addUserModal')).hide();
                e.target.reset();
                loadUsers();
            } else {
                const err = await res.json();
                alert(err.message);
            }
        });

        document.getElementById('addAccountForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData.entries());
            
            const res = await fetch('/api/admin/accounts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                bootstrap.Modal.getInstance(document.getElementById('addAccountModal')).hide();
                e.target.reset();
                loadUsers();
            } else {
                const err = await res.json();
                alert(err.message);
            }
        });

        async function updateBalance(accountId) {
            const balanceInput = document.getElementById(`balance-${accountId}`);
            const balance = balanceInput.value;
            
            try {
                const res = await fetch(`/api/admin/accounts/${accountId}/balance`, {
                    method: 'PATCH',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ balance })
                });
                
                if (res.ok) {
                    alert('Balance updated successfully');
                    loadUsers(); // Refresh to ensure data is synced
                } else {
                    const err = await res.json();
                    alert('Failed to update balance: ' + (err.message || 'Unknown error'));
                }
            } catch (err) {
                console.error('Update balance error:', err);
                alert('An error occurred while updating balance');
            }
        }

        async function deleteAccount(accountId) {
            if (!confirm('Are you sure you want to delete this account?')) return;
            const res = await fetch(`/api/admin/accounts/${accountId}`, { method: 'DELETE' });
            if (res.ok) loadUsers();
            else alert('Failed to delete account');
        }

        async function deleteUser(userId) {
            if (!confirm('Are you sure you want to delete this user and all their accounts?')) return;
            const res = await fetch(`/api/admin/users/${userId}`, { method: 'DELETE' });
            if (res.ok) loadUsers();
            else alert('Failed to delete user');
        }

        async function logout() {
            try {
                const res = await fetch('/api/logout', { method: 'POST' });
                const data = await res.json();
                if (data.signOffTime) {
                    sessionStorage.setItem("signOffTime", data.signOffTime);
                } else {
                    sessionStorage.setItem("signOffTime", new Date().toLocaleString());
                }
                window.location.href = '/signout.html';
            } catch (err) {
                console.error("Logout error:", err);
                window.location.href = '/signout.html';
            }
        }

        loadUsers();
    </script>
</body>
</html>
